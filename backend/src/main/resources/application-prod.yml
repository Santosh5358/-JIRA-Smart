# ========== PROD PROFILE ==========
# All secrets MUST come from environment variables. No defaults.

server:
  port: ${SERVER_PORT:8085}
  compression:
    enabled: true

# Tighter logging in production
logging:
  level:
    root: WARN
    com.dashboard.jira: INFO
    org.springframework.web: WARN
  file:
    name: ${LOG_FILE:/var/log/jira-dashboard/app.log}

# CORS — set to your production frontend URL
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
