server:
  port: ${SERVER_PORT:8085}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain,text/css,application/javascript
    min-response-size: 1024

spring:
  application:
    name: jira-smart-dashboard
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

# --- JWT ---
jwt:
  secret: ${JWT_SECRET:jira-smart-dashboard-secret-key-that-is-long-enough-for-hs256!}
  expiration-ms: ${JWT_EXPIRATION_MS:28800000}

# --- JIRA Configuration ---
jira:
  base-url: ${JIRA_BASE_URL:https://jira.dedalus.com/}
  api-token: ${JIRA_API_TOKEN:}

# --- GitHub Configuration ---
github:
  base-url: ${GITHUB_BASE_URL:https://github.com/dedalus-cis4u/}
  api-token: ${GITHUB_API_TOKEN:}
  default-org: ${GITHUB_DEFAULT_ORG:dedalus-cis4u}

# --- OpenAI / GitHub Models Configuration ---
openai:
  base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-4o}
  max-tokens: ${OPENAI_MAX_TOKENS:8000}

# --- CORS ---
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# --- Logging ---
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.dashboard.jira: ${LOG_LEVEL_APP:INFO}
    org.springframework.web: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE:logs/jira-dashboard.log}
