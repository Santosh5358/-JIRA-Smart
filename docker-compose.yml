version: '3.8'

services:
  backend:
    build: ./backend
    container_name: jira-dashboard-backend
    ports:
      - "${SERVER_PORT:-8085}:8085"
    env_file:
      - ./backend/.env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    volumes:
      - backend-logs:/var/log/jira-dashboard
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8085/api/auth/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build: ./frontend
    container_name: jira-dashboard-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend-logs:
